global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

frontend api_frontend
    bind *:5000
    mode http
    default_backend api_backend
    
    # Rate limiting
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny if { sc_http_req_rate(0) gt 100 }
    
    # Health check
    acl is_health path /health
    use_backend health_backend if is_health

backend api_backend
    mode http
    balance roundrobin
    option httpchk GET /api/health
    http-check expect status 200
    
    # Backend servers (scale as needed)
    server backend1 backend:5000 check inter 2000 rise 2 fall 3
    # Add more backend servers here for scaling
    # server backend2 backend:5000 check inter 2000 rise 2 fall 3
    # server backend3 backend:5000 check inter 2000 rise 2 fall 3

backend health_backend
    mode http
    http-request return status 200 content-type text/plain string "OK"

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats show-legends
    stats show-node

