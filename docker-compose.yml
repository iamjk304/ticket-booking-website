version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: travelease-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Bhaiya@6}
      MYSQL_DATABASE: ${DB_NAME:-travelease_db}
      MYSQL_USER: ${DB_USER:-travelease_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-Bhaiya@6}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - travelease-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travelease-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_NAME: ${DB_NAME:-travelease_db}
      DB_USER: ${DB_USER:-travelease_user}
      DB_PASSWORD: ${DB_PASSWORD:-Bhaiya@6}
      DB_PORT: 3306
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-my_super_secret_jwt_key_change_in_production_12345}
      JWT_EXPIRE: 7d
      FRONTEND_URL: http://localhost:8000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - travelease-network
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules

  # Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: travelease-frontend
    restart: always
    ports:
      - "9000:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./login.html:/usr/share/nginx/html/login.html:ro
      - ./search-results.html:/usr/share/nginx/html/search-results.html:ro
      - ./booking.html:/usr/share/nginx/html/booking.html:ro
      - ./payment.html:/usr/share/nginx/html/payment.html:ro
      - ./confirmation.html:/usr/share/nginx/html/confirmation.html:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - travelease-network

networks:
  travelease-network:
    driver: bridge

volumes:
  mysql_data:

