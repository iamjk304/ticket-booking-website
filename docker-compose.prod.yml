version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: travelease-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data_prod:/var/lib/mysql
    networks:
      - travelease-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password

  # Backend API
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: travelease-backend-prod
    restart: always
    environment:
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: 3306
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 7d
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - travelease-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: travelease-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./login.html:/usr/share/nginx/html/login.html:ro
      - ./search-results.html:/usr/share/nginx/html/search-results.html:ro
      - ./booking.html:/usr/share/nginx/html/booking.html:ro
      - ./payment.html:/usr/share/nginx/html/payment.html:ro
      - ./confirmation.html:/usr/share/nginx/html/confirmation.html:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - travelease-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Load Balancer (HAProxy)
  loadbalancer:
    image: haproxy:alpine
    container_name: travelease-lb
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - backend
    networks:
      - travelease-network

networks:
  travelease-network:
    driver: bridge

volumes:
  mysql_data_prod:
    driver: local

